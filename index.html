<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TravelSpeed Pro - 旅行测速仪 | Track Every Journey</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-dark: #0B0F1A;
      --bg-mid: #12162A;
      --cyan: #00E5FF;
      --teal: #3AF0C3;
      --orange: #FF9F1C;
      --text-primary: #E8ECF4;
      --text-muted: #8B95A8;
      --card-bg: rgba(18, 22, 42, 0.6);
      --max-width: 1200px;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: linear-gradient(160deg, var(--bg-dark) 0%, var(--bg-mid) 50%, #0d1220 100%);
      color: var(--text-primary);
      min-height: 100vh;
      line-height: 1.6;
    }

    /* ========== HEADER: logo, app name, slogan ========== */
    header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(11, 15, 26, 0.9);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(0, 229, 255, 0.1);
      padding: 1rem 1.5rem;
    }

    .header-inner {
      max-width: var(--max-width);
      margin: 0 auto;
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    .logo-link { display: block; flex-shrink: 0; text-decoration: none; }
    .logo-img {
      display: block;
      border-radius: 50%;
      object-fit: cover;
      box-shadow: 0 0 20px rgba(0, 229, 255, 0.25);
    }
    .logo-header { width: 48px; height: 48px; }

    .brand-text h1 {
      font-size: 1.35rem;
      font-weight: 700;
      color: var(--text-primary);
      letter-spacing: -0.02em;
    }

    .brand-text .slogan-header {
      font-size: 0.8rem;
      color: var(--text-muted);
      margin-top: 2px;
    }

    .brand-text .slogan-header .zh {
      color: var(--cyan);
      margin-left: 0.5rem;
    }

    /* ========== MAIN ========== */
    main {
      max-width: var(--max-width);
      margin: 0 auto;
      padding: 2rem 1.5rem 4rem;
    }

    /* ========== HERO: large logo, app name, slogan, download buttons ========== */
    .hero {
      text-align: center;
      padding: 4rem 0 5rem;
    }

    .hero-logo {
      width: 120px;
      height: 120px;
      margin: 0 auto 1.5rem;
      box-shadow: 0 0 40px rgba(0, 229, 255, 0.25);
    }

    .hero h2 {
      font-size: clamp(2rem, 5vw, 3rem);
      font-weight: 700;
      letter-spacing: -0.03em;
      margin-bottom: 0.5rem;
      background: linear-gradient(135deg, var(--cyan), var(--teal));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .hero .slogan {
      font-size: 1.1rem;
      color: var(--text-muted);
      margin-bottom: 0.25rem;
    }

    .hero .slogan-zh {
      font-size: 0.95rem;
      color: var(--cyan);
      opacity: 0.9;
      margin-bottom: 2.5rem;
    }

    /* Download buttons: iOS & Android */
    .download-buttons {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 1rem;
      margin-top: 2rem;
    }

    .btn-download {
      display: inline-flex;
      align-items: center;
      gap: 0.6rem;
      padding: 0.9rem 1.8rem;
      font-size: 1rem;
      font-weight: 600;
      font-family: inherit;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      text-decoration: none;
      color: var(--bg-dark);
      background: var(--orange);
      box-shadow: 0 4px 20px rgba(255, 159, 28, 0.35);
      transition: transform 0.2s, box-shadow 0.2s, filter 0.2s;
    }

    .btn-download:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 28px rgba(255, 159, 28, 0.5);
      filter: brightness(1.08);
    }

    .btn-download.ios {
      background: linear-gradient(180deg, #f5f5f7 0%, #e8e8ed 100%);
      color: #1d1d1f;
      box-shadow: 0 4px 20px rgba(255, 255, 255, 0.15);
    }

    .btn-download.ios:hover {
      box-shadow: 0 6px 28px rgba(255, 255, 255, 0.25);
    }

    .btn-download.android {
      background: linear-gradient(180deg, #3ddc84 0%, #2ca85a 100%);
      color: #0d0d0d;
      box-shadow: 0 4px 20px rgba(61, 220, 132, 0.35);
    }

    .btn-download.android:hover {
      box-shadow: 0 6px 28px rgba(61, 220, 132, 0.5);
    }

    .btn-download svg {
      width: 22px;
      height: 22px;
      flex-shrink: 0;
    }

    /* ========== FOOTER: copyright + policy/terms links ========== */
    footer {
      max-width: var(--max-width);
      margin: 0 auto;
      padding: 1.5rem 1.5rem 2rem;
      text-align: center;
      border-top: 1px solid rgba(0, 229, 255, 0.06);
    }

    footer p {
      font-size: 0.8rem;
      color: var(--text-muted);
      opacity: 0.85;
    }

    footer .footer-links { margin-bottom: 0.5rem; }
    footer .footer-links a {
      color: var(--cyan);
      text-decoration: none;
    }
    footer .footer-links a:hover { color: var(--teal); }
    footer .footer-links span { margin: 0 0.5rem; color: var(--text-muted); }
  </style>
</head>
<body>
  <!-- HEADER: logo, app name, slogan -->
  <header>
    <div class="header-inner">
      <a href="index.html" class="logo-link"><img src="logo.png" alt="TravelSpeed Pro" class="logo-img logo-header"></a>
      <div class="brand-text">
        <h1>TravelSpeed Pro</h1>
        <p class="slogan-header">
          Track Every Journey. Measure Every Moment.
          <span class="zh">旅行测速仪</span>
        </p>
      </div>
    </div>
  </header>

  <main>
    <!-- HERO: large logo, app name, slogan, download buttons -->
    <section class="hero" id="hero">
      <img src="logo.png" alt="" class="logo-img hero-logo">
      <h2>TravelSpeed Pro</h2>
      <p class="slogan">Track Every Journey. Measure Every Moment.</p>
      <p class="slogan-zh">旅行测速仪 — 记录每一程，丈量每一刻</p>
      <div class="download-buttons">
        <a href="#" class="btn-download ios" target="_blank" rel="noopener noreferrer" aria-label="Download on App Store">
          <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
            <path d="M18.71 19.5c-.83 1.24-1.71 2.45-3.05 2.47-1.34.03-1.77-.79-3.29-.79-1.53 0-2 .77-3.27.82-1.31.05-2.3-1.32-3.14-2.53C4.25 17 2.94 12.45 4.7 9.39c.87-1.52 2.43-2.48 4.12-2.51 1.28-.02 2.5.87 3.29.87.78 0 2.26-1.07 3.81-.91.65.03 2.47.26 3.64 1.98-.09.06-2.17 1.28-2.15 3.81.03 3.02 2.65 4.03 2.68 4.04-.03.07-.42 1.44-1.38 2.83M13 3.5c.73-.83 1.94-1.46 2.94-1.5.13 1.17-.34 2.35-1.04 3.19-.69.85-1.83 1.51-2.95 1.42-.15-1.15.41-2.35 1.05-3.11z"/>
          </svg>
          Download on iOS
        </a>
        <a href="#" class="btn-download android" target="_blank" rel="noopener noreferrer" aria-label="Get it on Google Play">
          <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
            <path d="M3,20.5V3.5C3,2.91 3.34,2.39 3.84,2.15L13.69,12L3.84,21.85C3.34,21.6 3,21.09 3,20.5M16.81,15.12L6.05,21.34L14.54,12.85L16.81,15.12M20.16,10.81C20.5,11.08 20.75,11.5 20.75,12C20.75,12.5 20.53,12.9 20.18,13.18L17.89,14.5L15.39,12L17.89,9.5L20.16,10.81M6.05,2.66L16.81,8.88L14.54,11.15L6.05,2.66Z"/>
          </svg>
          Download on Android
        </a>
      </div>
    </section>
  </main>

  <!-- FOOTER: policy/terms links + copyright -->
  <footer>
    <p class="footer-links">
      <a href="privacy.html" target="_blank" rel="noopener noreferrer">Privacy Policy</a>
      <span>·</span>
      <a href="terms.html" target="_blank" rel="noopener noreferrer">Terms of Service</a>
    </p>
    <p>© <span id="year"></span> TravelSpeed Pro (旅行测速仪). All rights reserved.</p>
  </footer>

  <script>document.getElementById('year').textContent = new Date().getFullYear();</script>
</body>
</html>
