<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Terms of Service / 用户协议 - TravelSpeed Pro</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-dark: #0B0F1A;
      --bg-mid: #12162A;
      --cyan: #00E5FF;
      --teal: #3AF0C3;
      --text-primary: #E8ECF4;
      --text-muted: #8B95A8;
      --max-width: 1200px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: linear-gradient(160deg, var(--bg-dark) 0%, var(--bg-mid) 50%, #0d1220 100%);
      color: var(--text-primary);
      min-height: 100vh;
      line-height: 1.6;
    }

    header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(11, 15, 26, 0.9);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(0, 229, 255, 0.1);
      padding: 0.75rem 1rem;
    }

    .header-inner {
      max-width: var(--max-width);
      margin: 0 auto;
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    a.logo-link { display: block; flex-shrink: 0; text-decoration: none; }
    .logo-img {
      display: block;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      object-fit: cover;
      box-shadow: 0 0 16px rgba(0, 229, 255, 0.25);
    }

    .brand-text h1 { font-size: 1.15rem; font-weight: 700; color: var(--text-primary); letter-spacing: -0.02em; }
    .brand-text .slogan-header { font-size: 0.7rem; color: var(--text-muted); margin-top: 2px; }
    .brand-text .slogan-header .zh { color: var(--cyan); margin-left: 0.35rem; }

    main {
      max-width: var(--max-width);
      margin: 0 auto;
      padding: 1.25rem 1rem 3rem;
    }

    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      color: var(--cyan);
      text-decoration: none;
      font-weight: 500;
      margin-bottom: 1.5rem;
      padding: 0.5rem 0;
      min-height: 44px;
      transition: color 0.2s;
    }

    .back-link:hover { color: var(--teal); }
    .back-link:focus { outline: 2px solid var(--cyan); outline-offset: 2px; }

    .page-title {
      font-size: clamp(1.5rem, 4vw, 2.25rem);
      font-weight: 700;
      color: var(--text-primary);
      margin-bottom: 0.35rem;
    }

    .page-title-zh {
      font-size: 0.95rem;
      color: var(--text-muted);
      margin-bottom: 1.5rem;
    }

    footer {
      max-width: var(--max-width);
      margin: 0 auto;
      padding: 1rem 1rem 1.5rem;
      text-align: center;
      border-top: 1px solid rgba(0, 229, 255, 0.06);
    }

    footer p { font-size: 0.8rem; color: var(--text-muted); opacity: 0.85; }
    footer .footer-links { margin-bottom: 0.5rem; }
    footer .footer-links a {
      color: var(--cyan);
      text-decoration: none;
      padding: 0.25rem 0;
    }
    footer .footer-links a:hover { color: var(--teal); }
    footer .footer-links span { margin: 0 0.4rem; color: var(--text-muted); }

    @media (min-width: 769px) {
      header { padding: 1rem 1.5rem; }
      .header-inner { gap: 1rem; }
      .logo-img { width: 48px; height: 48px; }
      .brand-text h1 { font-size: 1.35rem; }
      .brand-text .slogan-header { font-size: 0.8rem; }
      main { padding: 2rem 1.5rem 4rem; }
      .back-link { margin-bottom: 2rem; min-height: auto; padding: 0; }
      .page-title-zh { margin-bottom: 2rem; }
      footer { padding: 1.5rem 1.5rem 2rem; }
    }
  </style>
</head>
<body>
  <header>
    <div class="header-inner">
      <a href="index.html" class="logo-link" aria-label="TravelSpeed Pro Home">
        <img src="logo.png" alt="TravelSpeed Pro" class="logo-img">
      </a>
      <div class="brand-text">
        <h1>TravelSpeed Pro</h1>
        <p class="slogan-header">
          Track Every Journey. Measure Every Moment.
          <span class="zh">旅行测速仪</span>
        </p>
      </div>
    </div>
  </header>

  <main>
    <a href="index.html" class="back-link">← Back to Home / 返回首页</a>
    <h1 class="page-title">Terms of Service</h1>
    <p class="page-title-zh">用户协议</p>
  </main>

  <footer>
    <p class="footer-links">
      <a href="privacy.html" target="_blank" rel="noopener noreferrer">Privacy Policy</a>
      <span>·</span>
      <a href="terms.html" target="_blank" rel="noopener noreferrer">Terms of Service</a>
    </p>
    <p>© <span id="year"></span> TravelSpeed Pro (旅行测速仪). All rights reserved.</p>
  </footer>

  <script>document.getElementById('year').textContent = new Date().getFullYear();</script>
</body>
</html>
